format = """
[в–‘в–’в–“](#c4d2a3)\
[ у°җҝ ](bg:#c4d2a3 fg:#0b0c09)\
[оӮё](bg:#cdf076 fg:#c4d2a3)\
$directory\
[оӮё](fg:#cdf076 bg:#566039)\
$git_branch\
$git_status\
[оӮё](fg:#566039 bg:#2f3621)\
$nodejs\
$rust\
$golang\
$php\
[оӮё](fg:#2f3621 bg:#29301d)\
$time\
[ ](fg:#29301d)\
\n$character"""

[directory]
style = "fg:#1d2316 bg:#cdf076"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "вҖҰ/"

[directory.substitutions]
"Documents" = "у°Ҳҷ "
"Downloads" = "пҖҷ "
"Music" = "пҖҒ "
"Pictures" = "пҖҫ "

[git_branch]
symbol = "пҗҳ"
style = "bg:#566039"
format = '[[ $symbol $branch ](fg:#cdf076 bg:#566039)]($style)'

[git_status]
style = "bg:#566039"
format = '[[($all_status$ahead_behind )](fg:#cdf076 bg:#566039)]($style)'

[nodejs]
symbol = "оңҳ"
style = "bg:#2f3621"
format = '[[ $symbol ($version) ](fg:#cdf076 bg:#2f3621)]($style)'

[rust]
symbol = "оһЁ"
style = "bg:#2f3621"
format = '[[ $symbol ($version) ](fg:#cdf076 bg:#2f3621)]($style)'

[golang]
symbol = "оҳ§"
style = "bg:#2f3621"
format = '[[ $symbol ($version) ](fg:#cdf076 bg:#2f3621)]($style)'

[odin]
symbol = "уұӘғ"
style = "bg:#2f3621"
format = '[[ $symbol ($version) ](fg:#cdf076 bg:#2f3621)]($style)'

[c]
symbol = "оқұ"
style = "bg:#2f3621"
format = '[[ $symbol ($version) ](fg:#cdf076 bg:#2f3621)]($style)'

[python]
symbol = "уұ”Һ"
style = "bg:#2f3621"
format = '[[ $symbol ($version) ](fg:#cdf076 bg:#2f3621)]($style)'

[php]
symbol = "оҳҲ"
style = "bg:#2f3621"
format = '[[ $symbol ($version) ](fg:#cdf076 bg:#2f3621)]($style)'

[time]
disabled = false
time_format = "%R" # Hour:Minute Format
style = "bg:#29301d"
format = '[[ пҗә $time ](fg:#bacba0 bg:#29301d)]($style)'
